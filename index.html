<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina Web</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Pagina Web</h1>
        <nav>
            <button onclick="showTab('tab-estadistica')" class="tab-btn active">Estadística</button>
            <button onclick="showTab('tab-conjuntos')" class="tab-btn">Conjuntos</button>
            <button onclick="showTab('tab-probabilidad')" class="tab-btn">Probabilidad</button>
        </nav>
    </header>

    <main>
        <section id="tab-estadistica" class="tab-content active">
            <div class="card">
                <h2>Datos Numéricos</h2>
                <textarea id="data-input" placeholder="Ej: 10, 15, 20..."></textarea>
                <div class="button-group">
                    <button id="btn-generate" class="secondary">Generar 20 Aleatorios</button>
                    <button id="btn-calculate" class="primary">Calcular Todo</button>
                </div>
                <div id="error-msg" class="error"></div>
            </div>

            <div id="results-container" class="hidden">
                <div class="grid">
                    <div class="card">
                        <h3>Medidas</h3>
                        <div id="stats-summary" class="results-box"></div>
                    </div>
                    <div class="card">
                        <h3>Frecuencias</h3>
                        <div class="table-container">
                            <table id="freq-table">
                                <thead>
                                    <tr><th>X</th><th>fi</th><th>fr</th><th>Fi</th><th>Fr</th></tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="charts-grid">
                    <div class="card chart-container"><canvas id="chart-hist-poly"></canvas></div>
                    <div class="card chart-container"><canvas id="chart-ojiva"></canvas></div>
                    <div class="card chart-container"><canvas id="chart-pareto"></canvas></div>
                </div>
            </div>
        </section>

        <section id="tab-conjuntos" class="tab-content">
            <div class="card">
                <h2>Operaciones con Conjuntos</h2>
                <div class="grid">
                    <div>
                        <label>Conjunto A</label>
                        <input type="text" id="set-a" placeholder="1, 2, 3...">
                    </div>
                    <div>
                        <label>Conjunto B</label>
                        <input type="text" id="set-b" placeholder="3, 4, 5...">
                    </div>
                </div>
                <div class="button-group mt-1">
                    <button onclick="randomizeSets()" class="secondary">Aleatorio</button>
                    <button onclick="triggerCalculateSets()" class="primary">Calcular</button>
                </div>
                <div id="sets-results" class="results-box mt-1"></div>
            </div>
        </section>

        <section id="tab-probabilidad" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>Combinatoria</h2>
                    <div class="grid" style="grid-template-columns: 1fr 1fr;">
                        <div><label>n:</label><input type="number" id="comb-n" value="5"></div>
                        <div><label>r:</label><input type="number" id="comb-r" value="3"></div>
                    </div>
                    <div class="button-group">
                        <button onclick="randomizeComb()" class="secondary">Aleatorio</button>
                        <button onclick="triggerCalculateCombinatorics()" class="primary">Calcular</button>
                    </div>
                    <div id="comb-results" class="results-box mt-1"></div>
                </div>

                <div class="card">
                    <h2>Regla Multiplicativa</h2>
                    <input type="text" id="mult-input" placeholder="Ej: 2, 3, 2">
                    <div class="button-group">
                        <button onclick="randomizeMult()" class="secondary">Aleatorio</button>
                        <button onclick="triggerCalculateMultiplicative()" class="primary">Calcular</button>
                    </div>
                    <div id="mult-results" class="results-box mt-1"></div>
                </div>
            </div>
            <div class="card mt-1">
                <h3>Diagrama de Árbol</h3>
                <div id="tree-diagram" class="tree-container"></div>
            </div>
        </section>
    </main>

    <footer><p>Proyecto estadística</p></footer>

    <!-- Overlay de carga/error simulado -->
    <div id="overlay" class="hidden">
        <div class="overlay-content">
            <h3>System Alert</h3>
            <div class="msg-body">
                <img id="overlay-gif" src="" alt="Cargando">
                <p id="overlay-msg">Generando...</p>
            </div>
        </div>
    </div>

    <!-- Contenedor de imágenes laterales -->
    <div id="side-image-container" class="side-img">
        <img id="side-jpg" src="" alt="Imagen decorativa">
    </div>

    <script src="script.js"></script>
</body>
</html>
